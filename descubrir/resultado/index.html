<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png?v=5" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 9 Esenciales | Orden para ver</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .result-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 40px;
        }
        .result-header { text-align: center; margin-bottom: 50px; }
        .result-header h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .movie-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,140,90,0.15);
            border-color: rgba(255,140,90,0.3);
        }
        .movie-poster {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background: #111;
        }
        .movie-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .movie-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }
        .movie-year {
            color: var(--accent-orange);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .movie-reason {
            color: var(--text-gray);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .rank-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--accent-orange);
            color: white;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .card-inner-wrap { position: relative; }
    </style>
</head>
<body>
    <app-header></app-header>

    <main class="container">
        <div class="result-container">
            <header class="result-header">
                <span class="context-tag" style="background: rgba(255,140,90,0.1); color: var(--accent-orange); padding: 5px 12px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px;">SELECCIÓN IA</span>
                <h1 class="gradient-text">Top 9 Esenciales</h1>
                <p id="userContext" style="color: var(--text-gray); font-size: 1.1rem; margin-top: 15px;">Películas imprescindibles</p>
            </header>

            <div id="aiResult" class="movie-grid">
                <!-- Se inyectarán aquí las películas -->
            </div>
            
            <div style="text-align: center; margin-top: 60px;">
                <button class="btn" onclick="window.location.href='/descubrir/'" style="background: var(--accent-orange); color: white;">Nueva Búsqueda</button>
            </div>
        </div>
    </main>

    <app-footer></app-footer>

    <script type="module">
        import { searchTMDB, getImageUrl } from '/src/tmdb.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const moviesJson = localStorage.getItem('top9_result') || localStorage.getItem('top10_result');
            const genres = JSON.parse(localStorage.getItem('user_genres') || '[]');
            
            if (!moviesJson) {
                window.location.href = '/descubrir/';
                return;
            }

            document.getElementById('userContext').textContent = `Las obras maestras imprescindibles del género: ${genres.join(', ')}`;
            
            const movies = JSON.parse(moviesJson);
            const grid = document.getElementById('aiResult');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px; color: var(--accent-orange); font-size: 1.2rem;">Buscando pósters y empaquetando selección...</div>';
            
            let html = '';
            let validRank = 1;
            
            for (let i = 0; i < movies.length; i++) {
                const mov = movies[i];
                let posterUrl = null;
                
                try {
                    const res = await searchTMDB(mov.title);
                    if (res && res.results && res.results.length > 0) {
                        // Buscar una coincidencia válida que tenga imagen de póster
                        const validMovie = res.results.find(r => (r.media_type === 'movie' || !r.media_type) && r.poster_path);
                        if (validMovie) {
                            posterUrl = getImageUrl(validMovie.poster_path, 'w500');
                        } else if (res.results[0].poster_path) {
                            posterUrl = getImageUrl(res.results[0].poster_path, 'w500');
                        }
                    }
                } catch (e) {
                    console.error("TMDB error:", e);
                }
                
                // Si la búsqueda no devolvió un póster válido, nos saltamos esta película por completo
                if (!posterUrl) continue;
                
                html += `
                    <div class="movie-card">
                        <div class="card-inner-wrap">
                            <div class="rank-badge">${validRank}</div>
                            <img src="${posterUrl}" alt="${mov.title}" class="movie-poster" loading="lazy">
                        </div>
                        <div class="movie-info">
                            <h3 class="movie-title">${mov.title}</h3>
                            <div class="movie-year">${mov.year || ''}</div>
                            <div class="movie-reason">${mov.reason || ''}</div>
                        </div>
                    </div>
                `;
                
                validRank++;
            }
            
            grid.innerHTML = html;
        });
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
