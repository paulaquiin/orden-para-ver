<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Wars | Orden para ver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <app-header></app-header>

      <!-- Franchise Hero -->
      <section class="franchise-header">
        <style>@keyframes spinFast { 100% { transform: rotate(360deg); } }</style>
        <div class="container" style="text-align: center;">
          <span class="context-tag" id="contextTag">SINCRONIZANDO CON TMDB</span>
          <h1 class="franchise-title" id="franchiseTitle" style="display:flex; align-items:center; justify-content:center; gap: 15px;">
            Cargando
            <svg style="animation: spinFast 1s linear infinite; color: var(--accent-orange);" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </h1>
          <p class="franchise-summary" id="franchiseSummary" style="margin: 0 auto; color: var(--text-gray);">Conectando con el archivo temporal. Por favor, espera.</p>
        </div>
      </section>

      <!-- Timeline Section -->
      <section class="timeline-section">
        <div class="container">
          
          <!-- Controls -->
          <div class="timeline-controls">
            <div class="toggle-group">
              <button class="toggle-btn active">Orden Cronológico</button>
            </div>
            
            <div class="filter-group">
              <span class="filter-label">Filtrar por:</span>
              <button class="filter-btn active">Todo</button>
              <button class="filter-btn">Películas</button>
              <button class="filter-btn">Series</button>
              <button class="filter-btn">Animación</button>
            </div>
          </div>

          <div class="timeline-container relative">
            <div class="timeline-line"></div>
            <!-- Dynamic elements will be injected here via src/main.js -->

          </div> <!-- End Timeline Container -->
        </div>
      </section>

      <!-- Footer -->
      <app-footer></app-footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
