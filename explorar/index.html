<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png?v=5" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar | Orden para ver</title>
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Explorar | Orden para ver" />
    <meta property="og:description" content="Explora y encuentra el mejor orden cronológico para tus sagas." />
    <meta property="og:image" content="/orden-para-ver-og.jpg" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/orden-para-ver-og.jpg" />
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .explore-header {
            padding: 100px 0 40px;
        }
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }
        .explore-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }
        .explore-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-orange);
        }
        .explore-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .explore-info {
            padding: 15px;
        }
        .explore-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .explore-meta {
            font-size: 0.8rem;
            color: var(--text-gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .explore-rating {
            color: var(--accent-orange);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .category-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .category-desc {
            color: var(--text-gray);
            margin-bottom: 40px;
            max-width: 600px;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 100px 0;
            color: var(--text-gray);
        }
    </style>
</head>
<body>
    <app-header></app-header>

    <main class="container">
        <section class="explore-header">
            <h1 id="category-title" class="category-title">Cargando...</h1>
            <p id="category-desc" class="category-desc">Explora los mejores contenidos seleccionados para ti.</p>
        </section>

        <div id="explore-view">
            <div class="loading-spinner">Cargando recomendaciones premium...</div>
        </div>
    </main>

    <app-footer></app-footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
